<h2 class="sr-only">Diagrama entidad-relación conceptual del término CATALOG con relaciones dependientes y no dependientes</h2>
<style>
#erd { padding: 1rem 0; }
#erd svg.erDiagram .divider path { stroke-opacity: 0.5; }
#erd svg.erDiagram .row-rect-odd path,
#erd svg.erDiagram .row-rect-odd rect,
#erd svg.erDiagram .row-rect-even path,
#erd svg.erDiagram .row-rect-even rect { stroke: none !important; }
#erd-legend { display:flex; gap:18px; flex-wrap:wrap; font-size:13px; color:var(--text-secondary); margin-top:14px; }
#erd-legend span { display:flex; align-items:center; gap:6px; }
#erd-legend i { width:26px; height:0; display:inline-block; }
</style>
<div id="erd"></div>
<div id="erd-legend">
  <span><i style="border-top:2px solid var(--text-secondary)"></i> dependiente identifying 1:N</span>
  <span><i style="border-top:2px dashed var(--text-secondary)"></i> no dependiente</span>
  <span>catalogo metadata-first</span>
</div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
  },
});
const src = [
'erDiagram',
'  physical_catalog ||--|{ physical_schema : contiene_dep_1N',
'  storage_layer ||..o{ physical_catalog : storage_layer_code',
'  storage_location ||..o{ physical_catalog : storage_location_code',
'  storage_layer ||..o{ storage_location : storage_layer_code',
'  LIFECYCLE_STATE ||..o{ physical_catalog : catalogo',
'  LIFECYCLE_STATE ||..o{ physical_schema : catalogo',
'  LIFECYCLE_STATE ||..o{ storage_location : catalogo',
'  physical_catalog {',
'    TYD_CODE code PK',
'    TYD_NAME physical_name',
'  }',
'  physical_schema {',
'    TYD_CODE physical_catalog_code PK "FK dep"',
'    TYD_CODE code PK',
'    TYD_NAME physical_name',
'  }',
'  storage_layer {',
'    TYD_CODE code PK',
'    TYD_URL bucket_uri_location',
'    TYD_INT sort_order',
'  }',
'  storage_location {',
'    TYD_CODE code PK',
'    TYD_STRING container_path',
'  }',
'  LIFECYCLE_STATE {',
'    TYD_CODE code PK',
'  }'
].join('\n');
const { svg } = await mermaid.render('erd-svg', src);
document.getElementById('erd').innerHTML = svg;
document.querySelectorAll('#erd svg.erDiagram .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});
document.querySelectorAll('#erd svg.erDiagram .row-rect-odd path, #erd svg.erDiagram .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>
